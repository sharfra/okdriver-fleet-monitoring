<!DOCTYPE html>
<html>

<head>

<title>okDriver Fleet Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Segoe UI;
background:#0f172a;
color:white;
padding:20px;
}

h1{
margin-bottom:30px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.4);
}

.metric{
font-size:26px;
color:#00d1b2;
}

.alert{
background:#ff4d4d;
padding:10px;
margin-top:10px;
display:none;
border-radius:5px;
font-weight:bold;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

td,th{
border:1px solid #444;
padding:8px;
}

</style>

</head>

<body>

<h1>okDriver Live Fleet Monitoring</h1>

<div class="grid">

<div class="card">

<h3>Dashcam Live Feed</h3>
<p style="color:#94a3b8;font-size:14px;margin-top:8px">
Simulated dashcam feed for driver monitoring
</p>
<video 
width="100%" 
height="300" 
controls 
autoplay 
muted 
loop 
playsinline>

<source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">

</video>

</div>


<div class="card">

<h3>Driver Analytics</h3>

<div id="alert" class="alert">
⚠ SPEEDING DETECTED
</div>

<p>Total Trips: <span id="trips" class="metric">0</span></p>
<p>Live Drivers: <span id="drivers" class="metric">0</span></p>
<p>Violations: <span id="violations" class="metric">0</span></p>
<p>Risk Score: <span id="risk" class="metric">0</span></p>

<canvas id="speedChart"></canvas>

</div>

</div>


<div class="card">

<h3>Recent Driver Events</h3>

<table>

<thead>
<tr>
<th>Time</th>
<th>Driver</th>
<th>Event</th>
<th>Speed</th>
</tr>
</thead>

<tbody id="eventTable"></tbody>

</table>

</div>


<script>

const ctx=document.getElementById('speedChart').getContext('2d')

const chart=new Chart(ctx,{
type:'line',
data:{
labels:[],
datasets:[{
label:'Speed (km/h)',
data:[],
borderColor:'#00d1b2',
backgroundColor:'rgba(0,209,178,0.2)',
fill:true
}]
},
options:{
scales:{y:{min:0,max:120}}
}
})


const ws=new WebSocket("ws://127.0.0.1:8000/ws")

ws.onmessage=function(event){

const data=JSON.parse(event.data)

const time=new Date().toLocaleTimeString()

chart.data.labels.push(time)
chart.data.datasets[0].data.push(data.value)

if(chart.data.labels.length>10){

chart.data.labels.shift()
chart.data.datasets[0].data.shift()

}

chart.update()

document.getElementById("violations").innerText=data.violations
document.getElementById("risk").innerText=data.risk_score
document.getElementById("drivers").innerText=data.live_drivers
document.getElementById("trips").innerText=data.total_trips

if(data.risk_score>=50){
document.getElementById("risk").style.color="#ff4d4d"
}

const table=document.getElementById("eventTable")

const row=`
<tr>
<td>${time}</td>
<td>${data.driver_id}</td>
<td>${data.event_type}</td>
<td>${data.value.toFixed(2)}</td>
</tr>
`

table.innerHTML=row+table.innerHTML

if(data.event_type==="speeding" && data.value>80){

document.getElementById("alert").style.display="block"

setTimeout(()=>{
document.getElementById("alert").style.display="none"
},2000)

}

}

</script>

</body>
</html>
